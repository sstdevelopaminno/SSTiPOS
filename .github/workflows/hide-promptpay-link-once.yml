name: Hide PromptPay technical link once

on:
  push:
    branches:
      - hotfix/p0-security-pricing
    paths:
      - .github/workflows/hide-promptpay-link-once.yml

permissions:
  contents: write

jobs:
  update-payment-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: hotfix/p0-security-pricing
          fetch-depth: 0

      - name: Hide PromptPay technical URL from payment settings
        shell: python
        run: |
          from pathlib import Path

          path = Path("apps/backoffice-web/src/components/pos-preview/pos-settings-workspace.tsx")
          text = path.read_text(encoding="utf-8-sig")

          replacements = {
              'qrModePromptPayHint: "หน้าขายจะใช้ลิงก์ promptpay.io แล้วเปลี่ยนยอดตามบิลอัตโนมัติ",':
                  'qrModePromptPayHint: "ระบบจะสร้าง QR พร้อมยอดชำระตามบิลอัตโนมัติ",',
              'qrModeImageHint: "หน้าขายจะดึงภาพ QR นี้ไปแสดงแทนการสร้างลิงก์",':
                  'qrModeImageHint: "หน้าขายจะแสดงภาพ QR ที่อัปโหลดไว้",',
              'qrModePromptPayHint: "The sales screen uses promptpay.io and changes only the bill amount.",':
                  'qrModePromptPayHint: "The system automatically generates a QR code for the bill amount.",',
              'qrModeImageHint: "The sales screen shows this uploaded QR image instead of generating a link.",':
                  'qrModeImageHint: "The sales screen displays the uploaded QR image.",',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected text not found: {old}")
              text = text.replace(old, new, 1)

          url_preview_block = '''                <p className="break-all rounded-lg border border-slate-200 bg-white p-3 text-xs font-semibold text-slate-600">
                  {labels.promptpayLinkPreview}: {promptpayPayload || "-"}
                </p>
'''
          if url_preview_block not in text:
              raise SystemExit("PromptPay URL preview block not found")
          text = text.replace(url_preview_block, "", 1)

          path.write_text(text, encoding="utf-8")

          # Remove the one-time workflow after applying the UI change.
          Path(".github/workflows/hide-promptpay-link-once.yml").unlink(missing_ok=True)

      - name: Commit payment settings UI update
        run: |
          git config user.name "cpipos-ui-bot"
          git config user.email "actions@users.noreply.github.com"
          git add apps/backoffice-web/src/components/pos-preview/pos-settings-workspace.tsx .github/workflows/hide-promptpay-link-once.yml
          git commit -m "Hide PromptPay technical link in payment settings"
          git push origin HEAD:hotfix/p0-security-pricing
