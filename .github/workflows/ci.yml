name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - hotfix/**

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-promptpay-ui-privacy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/hotfix/p0-security-pricing'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hide technical PromptPay link and restore workflow
        shell: python
        run: |
          from pathlib import Path

          target = Path("apps/backoffice-web/src/components/pos-preview/pos-settings-workspace.tsx")
          text = target.read_text(encoding="utf-8-sig")

          replacements = {
              'qrModePromptPayHint: "หน้าขายจะใช้ลิงก์ promptpay.io แล้วเปลี่ยนยอดตามบิลอัตโนมัติ",':
                  'qrModePromptPayHint: "ระบบจะสร้าง QR พร้อมยอดชำระตามบิลอัตโนมัติ",',
              'qrModeImageHint: "หน้าขายจะดึงภาพ QR นี้ไปแสดงแทนการสร้างลิงก์",':
                  'qrModeImageHint: "หน้าขายจะแสดงภาพ QR ที่อัปโหลดไว้",',
              'qrModePromptPayHint: "The sales screen uses promptpay.io and changes only the bill amount.",':
                  'qrModePromptPayHint: "The system automatically generates a QR code for the bill amount.",',
              'qrModeImageHint: "The sales screen shows this uploaded QR image instead of generating a link.",':
                  'qrModeImageHint: "The sales screen displays the uploaded QR image.",',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected text not found: {old}")
              text = text.replace(old, new, 1)

          block = '''                <p className="break-all rounded-lg border border-slate-200 bg-white p-3 text-xs font-semibold text-slate-600">
                  {labels.promptpayLinkPreview}: {promptpayPayload || "-"}
                </p>
'''
          if block not in text:
              raise SystemExit("PromptPay URL preview block not found")
          text = text.replace(block, "", 1)
          target.write_text(text, encoding="utf-8")

          original_ci = '''name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - hotfix/**

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build backoffice (PR)
        if: github.event_name == 'pull_request'
        run: pnpm --filter backoffice-web build

      - name: Build backoffice (push)
        if: github.event_name == 'push'
        run: pnpm --filter backoffice-web build
'''
          Path(".github/workflows/ci.yml").write_text(original_ci, encoding="utf-8")
          Path(".github/workflows/hide-promptpay-link-once.yml").unlink(missing_ok=True)

      - name: Commit UI update
        run: |
          git config user.name "cpipos-ui-bot"
          git config user.email "actions@users.noreply.github.com"
          git add apps/backoffice-web/src/components/pos-preview/pos-settings-workspace.tsx .github/workflows/ci.yml .github/workflows/hide-promptpay-link-once.yml
          git commit -m "Hide PromptPay technical link in payment settings"
          git push origin HEAD:hotfix/p0-security-pricing

  verify:
    needs: apply-promptpay-ui-privacy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build backoffice (PR)
        if: github.event_name == 'pull_request'
        run: pnpm --filter backoffice-web build

      - name: Build backoffice (push)
        if: github.event_name == 'push'
        run: pnpm --filter backoffice-web build
